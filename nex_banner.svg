    <linearGradient id="brainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ffe0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7b5cf7" stop-opacity="0.05"/>
