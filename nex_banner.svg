    <linearGradient id="subGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffe0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7b5cf7" stop-opacity="0.9"/>
