      <stop offset="100%" stop-color="#010306"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ffe0" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00ffe0" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#7b5cf7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b5cf7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glowLine2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b5cf7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#7b5cf7" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00ffe0" stop-opacity="0.5"/>
